  <style>
    :root {
      --bg: #0b0c10;
      --surface: #15171c;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #e7e9ee;
      --text-2: #9aa0ab;
      --text-3: #5d626c;
      --accent: #5eead4;
      --accent-soft: rgba(94, 234, 212, 0.12);
      --accent-line: rgba(94, 234, 212, 0.35);
      --linkedin: #0a66c2;
      --linkedin-hover: #004182;
      --cat-blog: #818cf8;
      --cat-research: #5eead4;
      --cat-tutorial: #fbbf24;
      --cat-opinion: #f472b6;
      --cat-news: #60a5fa;
      --cat-other: #94a3b8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 15px; line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    .page { max-width: 860px; margin: 0 auto; padding: 48px 24px 96px; }
    .eyebrow {
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); font-weight: 600; margin-bottom: 8px;
    }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 8px; }
    .header-content { display: flex; align-items: center; gap: 18px; margin-top: 16px; }
    .author-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 2px solid var(--border-strong);
    }
    .header-text { flex: 1; min-width: 0; }
    .meta { color: var(--text-2); font-size: 14px; margin-bottom: 20px; }
    .byline {
      font-size: 13px; color: var(--text-2); margin: 6px 0 14px;
    }
    .byline a {
      color: var(--text-2); text-decoration: underline;
      text-decoration-color: var(--accent-line);
      text-underline-offset: 3px; transition: color 0.15s;
    }
    .byline a:hover { color: var(--accent); }
    .byline-sep { color: var(--text-3); margin: 0 6px; }
    .byline-source {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--text-2); text-decoration: none;
      transition: color 0.15s;
    }
    .byline-source:hover { color: var(--accent); }
    .byline-source svg { width: 14px; height: 14px; fill: currentColor; }

    .share-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 0 0 24px; align-items: center; }
    .share-btn--linkedin {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; padding: 9px 16px;
      border-radius: 999px; cursor: pointer;
      background: var(--linkedin); color: #ffffff;
      border: 1px solid var(--linkedin);
      text-decoration: none; transition: all 0.15s;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(10, 102, 194, 0.25);
    }
    .share-btn--linkedin:hover {
      background: var(--linkedin-hover); border-color: var(--linkedin-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(10, 102, 194, 0.35);
    }
    .share-btn--linkedin svg { width: 16px; height: 16px; flex-shrink: 0; fill: #ffffff; }
    .share-btn--copy {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; padding: 8px 14px;
      border-radius: 999px; cursor: pointer;
      border: 1px solid var(--border-strong);
      background: var(--surface); color: var(--text-2);
      text-decoration: none; transition: all 0.15s;
      font-family: inherit;
    }
    .share-btn--copy:hover { color: var(--text); border-color: var(--accent-line); background: rgba(94, 234, 212, 0.06); }
    .share-btn--copy svg { width: 14px; height: 14px; flex-shrink: 0; }
    .share-hint { font-size: 11px; color: var(--text-3); font-style: italic; }
    .share-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #0a0a0f; padding: 8px 16px;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999;
    }
    .share-toast.show { opacity: 1; }
    .overview-section {
      background: var(--surface); border-left: 3px solid var(--accent);
      border-radius: 0 12px 12px 0; padding: 16px 20px;
      margin: 0 0 28px;
    }
    .overview-label {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin-bottom: 8px;
    }
    .overview-text {
      font-size: 15px; line-height: 1.65; color: var(--text); margin: 0;
    }
    .back-link { color: var(--text-3); font-size: 13px; text-decoration: none; }
    .back-link:hover { color: var(--accent); }

    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .pill {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
      padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .pill:hover { border-color: var(--border-strong); color: var(--text); }
    .pill.active { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent); }
    .pill .count {
      background: rgba(255, 255, 255, 0.06); padding: 1px 7px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .pill.active .count { background: rgba(94, 234, 212, 0.18); }

    .articles { display: flex; flex-direction: column; gap: 14px; }
    .article {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 22px 24px; position: relative; overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
    }
    .article:hover { border-color: var(--border-strong); transform: translateY(-1px); }
    .article__score-bar {
      position: absolute; top: 0; left: 0; height: 2px;
      background: var(--accent); opacity: 0.6;
    }
    .article__top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; gap: 12px;
    }
    .category {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 6px; background: rgba(255, 255, 255, 0.04);
    }
    .category::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .cat-blog { color: var(--cat-blog); }
    .cat-research { color: var(--cat-research); }
    .cat-tutorial { color: var(--cat-tutorial); }
    .cat-opinion { color: var(--cat-opinion); }
    .cat-news { color: var(--cat-news); }
    .cat-other { color: var(--cat-other); }
    .score { font-size: 12px; color: var(--text-3); font-family: ui-monospace, "SF Mono", Menlo, monospace; }

    .article__title { margin: 0 0 8px; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.35; }
    .article__title a { color: var(--text); text-decoration: none; }
    .article__title a:hover { color: var(--accent); }
    .article__meta {
      font-size: 13px; color: var(--text-2); margin-bottom: 12px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
    }
    .article__meta .dot { color: var(--text-3); padding: 0 4px; }
    .article__meta .host {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; color: var(--text-2);
      background: rgba(255, 255, 255, 0.04);
      padding: 2px 8px 2px 6px; border-radius: 4px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .article__meta .host:hover { color: var(--accent); background: var(--accent-soft); }
    .article__meta .favicon {
      width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
      background: rgba(255, 255, 255, 0.06);
    }
    .article__meta .date-fallback {
      font-size: 11px; color: var(--text-3); font-style: italic; margin-left: 4px;
    }
    .article__summary { color: var(--text-2); margin: 0 0 14px; }

    .takeaways {
      background: rgba(255, 255, 255, 0.02);
      border-left: 2px solid var(--accent-line);
      border-radius: 0 8px 8px 0;
      padding: 12px 16px 12px 14px;
      margin: 0 0 14px;
    }
    .takeaways__label {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent); font-weight: 600; margin-bottom: 6px;
    }
    .takeaways ul { list-style: none; padding: 0; margin: 0; }
    .takeaways li {
      position: relative; padding-left: 16px; margin: 4px 0;
      font-size: 13.5px; line-height: 1.5; color: var(--text);
    }
    .takeaways li::before {
      content: "→"; position: absolute; left: 0;
      color: var(--accent); font-weight: 600;
    }
    .article__footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; color: var(--text-3); background: rgba(255, 255, 255, 0.04);
      padding: 3px 8px; border-radius: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .read-link { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 500; }
    .read-link:hover { text-decoration: underline; }
    .hidden { display: none !important; }
    .empty {
      text-align: center; padding: 60px 20px; color: var(--text-3);
      background: var(--surface); border: 1px dashed var(--border); border-radius: 14px;
    }
  </style>
</head>

  <script>
    const articles = Array.from(document.querySelectorAll(".article"));
    const filtersEl = document.getElementById("filters");
    const emptyEl = document.getElementById("empty");
    const CATEGORIES = ["all", "blog", "research", "tutorial", "opinion", "news", "other"];
    let current = "all";

    function counts() {
      const c = { all: articles.length };
      for (const a of articles) {
        const k = a.dataset.category || "other";
        c[k] = (c[k] || 0) + 1;
      }
      return c;
    }

    function render() {
      const c = counts();
      filtersEl.innerHTML = CATEGORIES
        .filter(cat => cat === "all" || c[cat])
        .map(cat => `
          <button class="pill ${current === cat ? "active" : ""}" data-cat="${cat}">
            ${cat === "all" ? "All" : cat.charAt(0).toUpperCase() + cat.slice(1)}
            <span class="count">${c[cat] || 0}</span>
          </button>
        `).join("");
      filtersEl.querySelectorAll(".pill").forEach(btn => {
        btn.addEventListener("click", () => { current = btn.dataset.cat; render(); });
      });
      let visible = 0;
      for (const a of articles) {
        const show = current === "all" || a.dataset.category === current;
        a.classList.toggle("hidden", !show);
        if (show) visible++;
      }
      emptyEl.classList.toggle("hidden", visible > 0);
    }

    render();

    // Copy-link button (no-op if button not present)
    const copyBtn = document.querySelector(".share-btn--copy");
    const toast = document.getElementById("shareToast");
    if (copyBtn && toast) {
      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(copyBtn.dataset.url);
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 1500);
        } catch (_) {
          // Older browsers: fall back to a prompt
          window.prompt("Copy this URL:", copyBtn.dataset.url);
        }
      });
    }
  </script>
